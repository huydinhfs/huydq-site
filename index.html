<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HuyDQ Playground</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

h1{
margin-top:50px;
font-size:38px;
}

p{
color:#94a3b8;
}

.clock{
font-size:18px;
margin-top:10px;
}

.search{
margin-top:20px;
}

input{
padding:10px;
width:250px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
max-width:800px;
margin:40px auto;
padding:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
background:#334155;
}

a{
text-decoration:none;
color:white;
font-size:18px;
}

.monitor{
margin-top:20px;
color:#22c55e;
font-family:monospace;
}

.terminal{
background:black;
color:#00ff9c;
padding:20px;
margin:40px auto;
max-width:600px;
font-family:monospace;
text-align:left;
border-radius:10px;
}

</style>

</head>

<body>

<h1>HuyDQ Playground</h1>
<p>Random experiments with tech</p>

<div class="clock" id="clock"></div>

<div class="search">
<form action="https://www.google.com/search">
<input name="q" placeholder="Search Google...">
<button>Search</button>
</form>
</div>

<div class="grid">

<div class="card"><a href="/ai">🤖 AI</a></div>

<div class="card"><a href="/network">🌐 Network</a></div>

<div class="card"><a href="/tools">🛠 Tools</a></div>

<div class="card"><a href="/projects">🚀 Projects</a></div>

<div class="card"><a href="/notes">📓 Notes</a></div>

<div class="card"><a href="https://github.com">💻 GitHub</a></div>

</div>

<div class="monitor" id="monitor"></div>

<div class="terminal">
$ initializing huydq lab... <br>
$ loading modules... <br>
$ system ready <br>
</div>

<script>

function updateClock(){

const now=new Date();

document.getElementById("clock").innerText=
now.toLocaleString();

}

setInterval(updateClock,1000);

function fakeMonitor(){

const cpu=(Math.random()*80+10).toFixed(1);

const ram=(Math.random()*70+20).toFixed(1);

document.getElementById("monitor").innerText=
"CPU "+cpu+"% | RAM "+ram+"%";

}

setInterval(fakeMonitor,2000);

</script>

</body>
</html>
