<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HuyDQ Playground</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

h1{
margin-top:40px;
font-size:36px;
}

p{
color:#94a3b8;
}

.clock{
margin-top:10px;
}

.search{
margin-top:15px;
}

input{
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:20px;
max-width:800px;
margin:40px auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
background:#334155;
}

a{
text-decoration:none;
color:white;
font-size:18px;
}

.monitor{
margin-top:20px;
font-family:monospace;
color:#22c55e;
}

.terminal{
background:black;
color:#00ff9c;
padding:20px;
margin:40px auto;
max-width:600px;
font-family:monospace;
text-align:left;
border-radius:10px;
}

.chat{
background:#1e293b;
max-width:600px;
margin:40px auto;
padding:20px;
border-radius:10px;
}

#chatlog{
height:150px;
overflow:auto;
background:#0f172a;
padding:10px;
margin-bottom:10px;
font-family:monospace;
}

</style>

</head>

<body>

<h1>HuyDQ Playground</h1>
<p>Random experiments with tech</p>

<div class="clock" id="clock"></div>

<div class="search">
<form action="https://www.google.com/search">
<input name="q" placeholder="Search Google...">
<button>Search</button>
</form>
</div>

<div class="grid">

<div class="card"><a href="/ai">🤖 AI</a></div>
<div class="card"><a href="/network">🌐 Network</a></div>
<div class="card"><a href="/tools">🛠 Tools</a></div>
<div class="card"><a href="/projects">🚀 Projects</a></div>
<div class="card"><a href="/notes">📓 Notes</a></div>
<div class="card"><a href="https://github.com">💻 GitHub</a></div>

</div>

<div class="monitor" id="monitor"></div>

<div class="terminal">
$ booting huydq system... <br>
$ loading modules... <br>
$ status: online <br>
</div>

<div class="chat">

<h3>🤖 Mini AI Chat</h3>

<div id="chatlog"></div>

<input id="chatinput" placeholder="ask something..." style="width:70%">

<button onclick="send()">Send</button>

</div>

<script>

function updateClock(){

const now=new Date();

document.getElementById("clock").innerText=
now.toLocaleString("vi-VN");

}

setInterval(updateClock,1000);

function fakeMonitor(){

const cpu=(Math.random()*70+20).toFixed(1);
const ram=(Math.random()*60+30).toFixed(1);
const net=(Math.random()*100).toFixed(1);

document.getElementById("monitor").innerText=
"CPU "+cpu+"% | RAM "+ram+"% | NET "+net+"kb/s";

}

setInterval(fakeMonitor,2000);

function send(){

const input=document.getElementById("chatinput");
const log=document.getElementById("chatlog");

const user=input.value;

if(!user) return;

log.innerHTML+="<div>> "+user+"</div>";

let reply="I don't know 😆";

if(user.includes("hello")) reply="hello human";
if(user.includes("ai")) reply="AI experiments coming soon";
if(user.includes("network")) reply="check network page";
if(user.includes("who")) reply="this is huydq playground";

log.innerHTML+="<div style='color:#22c55e'>AI: "+reply+"</div>";

input.value="";
log.scrollTop=log.scrollHeight;

}

</script>

</body>
</html>
